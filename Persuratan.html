<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📩 Persuratan Warga - SOLID RW</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .navbar-brand { font-weight: 700; }
        .card { border: none; border-radius: 12px; }
        
        /* Proteksi layer ben gak kedap-kedip pas diredirect */
        #content-wrapper { display: none; }

        @media print {
            body * { visibility: hidden; }
            #isi-surat-cetak, #isi-surat-cetak * { visibility: visible; }
            #isi-surat-cetak { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="content-wrapper">
        <nav class="navbar navbar-light bg-white sticky-top shadow-sm mb-5">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <span style="color: #007bff">●</span> SOLID <span style="font-weight:300; color: #6b7280;">RW</span>
                </a>
                <div>
                    <span id="badge-rt-login" class="badge badge-info p-2 font-weight-bold mr-2">Mendeteksi...</span>
                    <a href="index.html" class="btn btn-light rounded-pill px-4 font-weight-bold btn-sm shadow-sm">
                        🏠 Kembali ke Beranda
                    </a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row mb-4 align-items-center">
                <div class="col-md-8">
                    <h3 class="font-weight-bold text-dark mb-1">📩 Riwayat Pribadi Anda</h3>
                    <p class="text-muted small">Monitoring status data pengajuan milik Anda secara real-time</p>
                </div>
                <div class="col-md-4 text-md-right">
                    <button class="btn btn-primary rounded-pill font-weight-bold px-4 shadow-sm py-2" data-toggle="modal" data-target="#modalFormPengantar">
                        ➕ Buat Pengajuan Baru
                    </button>
                </div>
            </div>

            <div class="card shadow-sm overflow-hidden mb-5">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-light text-secondary font-weight-bold" style="font-size: 0.85rem;">
                            <tr>
                                <th>JENIS SURAT / ID</th>
                                <th>NAMA PEMOHON</th>
                                <th>STATUS ALUR</th>
                                <th class="text-center">AKSI / VALIDATOR</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-surat-warga">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalFormPengantar" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title font-weight-bold">Formulir Pengajuan Surat Pengantar</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form id="formSuratWarga" onsubmit="submitSuratKompleks(event)">
                    <div class="modal-body p-4">
                        <div class="row">
                            <div class="form-group col-md-12">
                                <div class="alert alert-secondary small font-weight-bold text-dark bg-light border-0">
                                    📍 Wilayah Anda: <span id="text-rt-terkunci" class="text-primary">Memuat...</span>
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Nama Lengkap</label>
                                <input type="text" id="p_nama" class="form-control bg-light" readonly required>
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Tempat, Tanggal Lahir</label>
                                <input type="text" id="p_ttl" class="form-control" required placeholder="Sidoarjo, 12 Agustus 1990">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Jenis Kelamin</label>
                                <select id="p_jk" class="form-control" required>
                                    <option value="Laki-laki">Laki-laki</option>
                                    <option value="Perempuan">Perempuan</option>
                                </select>
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Agama</label>
                                <input type="text" id="p_agama" class="form-control" required placeholder="Islam">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Pekerjaan</label>
                                <input type="text" id="p_pekerjaan" class="form-control" required placeholder="Swasta">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Pendidikan Terakhir</label>
                                <input type="text" id="p_pendidikan" class="form-control" required placeholder="SMA / S1">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Nomor Kartu Keluarga (KK)</label>
                                <input type="number" id="p_kk" class="form-control" required placeholder="3515...">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Nomor KTP / NIK</label>
                                <input type="number" id="p_ktp" class="form-control" required placeholder="3515...">
                            </div>
                            <div class="form-group col-md-12">
                                <label class="font-weight-bold small">Alamat Lengkap Dusun</label>
                                <textarea id="p_alamat" class="form-control" rows="2" required placeholder="Dusun Malang Desa Ganting"></textarea>
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">Keperluan Surat</label>
                                <input type="text" id="p_keperluan" class="form-control" required placeholder="Mengurus KTP Hilang / Surat Nikah">
                            </div>
                            <div class="form-group col-md-6">
                                <label class="font-weight-bold small">No. Telp / Gmail Kontak</label>
                                <input type="text" id="p_telp_gmail" class="form-control" required placeholder="0812345xxx / warga@gmail.com">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-light text-right">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 font-weight-bold">🚀 Kirim Pengajuan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="isi-surat-cetak" class="d-none d-print-block"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbxADW-wf-uWrOs95bNwqpf_gWKm9yNViuLXxI0BtMEZ8UanBtptRi-_50CkNK3xUSVR/exec";

        const DATA_KETUA_RT = {
            "001": "SAIFUL HIDAYAT",
            "002": "BAPAK BAMBANG JAYADI",
            "003": "BAPAK SUPRIYANTO",
            "004": "BAPAK AGUS BUDIARTO"
        };

        // ============================================================================
        // 🛡️ SECURITY ENGINE FIX SINKRON: CEK STATUS LOGIN WARGA (GATEKEEPER)
        // ============================================================================
        const sessionWarga = localStorage.getItem("solid_rw_user"); 
        let LOGGED_USER_NAME = "";
        let LOGGED_USER_RT = "";

        if (!sessionWarga || sessionWarga === "null" || sessionWarga === "undefined") {
            alert("🔒 Akses Ditolak! Sampeyan kudu login dhisik, Bos.");
            window.location.href = "index.html"; 
        } else {
            try {
                const parsedUser = JSON.parse(sessionWarga);
                LOGGED_USER_NAME = parsedUser.nama;
                // Amankan format RT dadi 3 digit (conto: "3" dadi "003") ben sinkron karo DATA_KETUA_RT
                let rtRaw = parsedUser.rt ? parsedUser.rt.toString().replace(/\D/g, "") : "";
                LOGGED_USER_RT = rtRaw.padStart(3, '0');

                if (!LOGGED_USER_NAME || !LOGGED_USER_RT || LOGGED_USER_RT === "000") {
                    alert("🔒 Akses Ditolak! Data login tidak valid.");
                    window.location.href = "index.html";
                } else {
                    document.getElementById('content-wrapper').style.display = 'block';
                }
            } catch(e) {
                alert("🔒 Akses Ditolak! Terjadi kesalahan session.");
                window.location.href = "index.html";
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            if (LOGGED_USER_RT) {
                document.getElementById('badge-rt-login').innerText = `🔐 Akun: ${LOGGED_USER_NAME} (RT.${LOGGED_USER_RT})`;
                document.getElementById('text-rt-terkunci').innerText = `RT ${LOGGED_USER_RT} (Ketua RT: ${DATA_KETUA_RT[LOGGED_USER_RT] || 'Ketua RT'})`;
                document.getElementById('p_nama').value = LOGGED_USER_NAME; 
                
                renderTabelWargaCloud();
            }
        });

        // 1. API ENGINE: POST DATA
        async function submitSuratKompleks(event) {
            event.preventDefault();
            const btnSubmit = event.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<span>⏳ Mengirim...</span>`;

            const payload = {
                action: "tambahSuratGanting",
                id: 'GNT-' + Date.now(),
                no_rt: LOGGED_USER_RT,
                nama: LOGGED_USER_NAME, 
                ttl: document.getElementById('p_ttl').value,
                jk: document.getElementById('p_jk').value,
                agama: document.getElementById('p_agama').value,
                pekerjaan: document.getElementById('p_pekerjaan').value,
                pendidikan: document.getElementById('p_pendidikan').value,
                kk: document.getElementById('p_kk').value,
                ktp: document.getElementById('p_ktp').value,
                alamat: document.getElementById('p_alamat').value,
                keperluan: document.getElementById('p_keperluan').value,
                telp_gmail: document.getElementById('p_telp_gmail').value
            };

            try {
                const response = await fetch(SPREADSHEET_API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "sukses" || result.success === true) {
                    $('#modalFormPengantar').modal('hide');
                    alert('🚀 Pengajuan Berhasil Dikirim!');
                    event.target.reset();
                    document.getElementById('p_nama').value = LOGGED_USER_NAME;
                    renderTabelWargaCloud(); 
                }
            } catch (error) {
                alert("❌ Koneksi API Gagal!");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = originalText;
            }
        }

        // 2. API ENGINE: GET & FILTER RIWAYAT KHUSUS WARGA SING LOGIN
        async function renderTabelWargaCloud() {
            const tbody = document.getElementById('tabel-surat-warga');
            if (!tbody) return;
            
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>`;

            try {
                const response = await fetch(SPREADSHEET_API_URL + "?action=ambilSuratGanting");
                const dbSurat = await response.json();
                tbody.innerHTML = '';
                
                if (!dbSurat || dbSurat.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">❌ Belum ada riwayat pengajuan.</td></tr>`;
                    return;
                }

                const riwayatPribadi = dbSurat.filter(item => {
                    let rtBersih = item.no_rt ? item.no_rt.toString().replace(/\D/g, "") : "";
                    let rtBersihFormatted = rtBersih.padStart(3, '0');
                    return item.nama.toLowerCase().trim() === LOGGED_USER_NAME.toLowerCase().trim() && rtBersihFormatted === LOGGED_USER_RT;
                });

                if(riwayatPribadi.length === 0){
                     tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">❌ Anda belum pernah membuat pengajuan surat.</td></tr>`;
                     return;
                }

                riwayatPribadi.reverse().forEach(surat => {
                    let badgeStatus = '';
                    let tombolTindakan = '';
                    let noRtData = surat.no_rt ? surat.no_rt.toString().replace(/\D/g, "") : "001";
                    let noRtFormatted = noRtData.padStart(3, '0');
                    let namaRtValidator = DATA_KETUA_RT[noRtFormatted] || "Ketua RT";

                    if (surat.status === 'Menunggu Validasi RT') {
                        badgeStatus = `<span class="badge badge-warning font-weight-bold px-3 py-2">⏳ PROSES DI RT.${noRtFormatted}</span>`;
                        tombolTindakan = `<span class="text-muted small">Menunggu Bpk <b>${namaRtValidator}</b></span>`;
                    } else if (surat.status === 'Menunggu Validasi RW') {
                        badgeStatus = `<span class="badge badge-info font-weight-bold px-3 py-2">⏳ PROSES DI RW</span>`;
                        tombolTindakan = `<span class="text-muted small">Menunggu Bpk <b>Mochamad Soffa</b></span>`;
                    } else if (surat.status === 'Selesai') {
                        badgeStatus = `<span class="badge badge-success font-weight-bold px-3 py-2">✅ SELESAI</span>`;
                        const stringData = encodeURIComponent(JSON.stringify(surat));
                        tombolTindakan = `<button class="btn btn-dark btn-sm rounded-pill font-weight-bold btn-block shadow-sm" onclick="eksekusiCetakGanting('${stringData}')">🖨️ Cetak Surat</button>`;
                    }

                    tbody.innerHTML += `
                        <tr style="font-size: 0.88rem;">
                            <td class="align-middle"><span class="font-weight-bold text-dark">Surat Pengantar</span><br><small class="text-muted font-italic">${surat.id}</small></td>
                            <td class="align-middle font-weight-bold text-secondary text-uppercase">${surat.nama}</td>
                            <td class="align-middle">${badgeStatus}</td>
                            <td class="align-middle text-center">${tombolTindakan}</td>
                        </tr>`;
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">❌ Gagal memuat data.</td></tr>`;
            }
        }

        // 3. ENGINE CETAK SURAT + TTD ONLINE (QR CODE)
        function eksekusiCetakGanting(encodedData) {
            const s = JSON.parse(decodeURIComponent(encodedData));
            const tahunSekarang = new Date().getFullYear();
            let noRtData = s.no_rt ? s.no_rt.toString().replace(/\D/g, "") : "001";
            let noRtFormatted = noRtData.padStart(3, '0');
            let namaRtValidator = DATA_KETUA_RT[noRtFormatted] || "SAIFUL HIDAYAT";

            const qrTtdOnlineRT = `https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=SIGNED_ONLINE_BY_RT_${noRtFormatted}_ID_${s.id}`;
            const qrTtdOnlineRW = `https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=SIGNED_ONLINE_BY_RW_001_ID_${s.id}`;

            const templateDokumenWord = `
                <div style="width: 100%; font-family: 'Times New Roman', Times, serif; color: #000; padding: 20px; line-height: 1.6;">
                    <div style="text-align: center; font-weight: bold; font-size: 14pt;">
                        <div style="letter-spacing: 0.5px;">RUKUN TETANGGA ${noRtFormatted}</div>
                        <div style="letter-spacing: 0.5px;">RUKUN WARGA 001</div>
                        <div style="letter-spacing: 0.5px;">DUSUN MALANG DESA GANTING</div>
                    </div>
                    <div style="border-bottom: 4px double #000; margin-top: 5px; margin-bottom: 25px;"></div>
                    
                    <div style="text-align: center; margin-bottom: 30px;">
                        <span style="font-weight: bold; font-size: 12pt; text-decoration: underline;">SURAT KETERANGAN / PENGANTAR</span><br>
                        <span>Nomor : ${s.no_rt_num || '...'} / RT.${noRtFormatted}/RW.001/       /${tahunSekarang}</span>
                    </div>
                    
                    <p style="text-indent: 45px; text-align: justify; font-size: 11pt;">Yang bertanda tangan dibawah ini menerangkan bahwa :</p>
                    
                    <table style="width: 100%; margin-left: 15px; border-collapse: collapse; font-size: 11pt; line-height: 1.9; text-align: left;">
                        <tr><td style="width: 4%;">1.</td><td style="width: 28%;">N a m a</td><td style="width: 3%;">:</td><td style="font-weight: bold; text-transform: uppercase;">${s.nama}</td></tr>
                        <tr><td>2.</td><td>Tempat/Tgl. Lahir</td><td>:</td><td>${s.ttl}</td></tr>
                        <tr><td>3.</td><td>Jenis Kelamin</td><td>:</td><td>${s.jk}</td></tr>
                        <tr><td>4.</td><td>A g a m a</td><td>:</td><td>${s.agama}</td></tr>
                        <tr><td>5.</td><td>Pekerjaan</td><td>:</td><td>${s.pekerjaan}</td></tr>
                        <tr><td>6.</td><td>Pendidikan</td><td>:</td><td>${s.pendidikan}</td></tr>
                        <tr><td>7.</td><td>Nomor  K  K</td><td>:</td><td>${s.kk}</td></tr>
                        <tr><td>8.</td><td>Nomor  K T  P</td><td>:</td><td>${s.ktp}</td></tr>
                        <tr><td>9.</td><td>A l a m a t</td><td>:</td><td>${s.alamat}</td></tr>
                        <tr><td>10.</td><td>Keperluan</td><td>:</td><td>${s.keperluan}</td></tr>
                        <tr><td>11.</td><td>No. Telp/Gmail</td><td>:</td><td>${s.telp_gmail}</td></tr>
                    </table>
                    
                    <p style="text-indent: 45px; margin-top: 25px; text-align: justify; font-size: 11pt;">Demikian surat keterangan ini dibuat untuk dipergunakan sebagaimana mestinya.</p>
                    
                    <div style="text-align: right; margin-top: 45px; margin-right: 50px; font-size: 11pt;">Ganting, ............................. ${tahunSekarang}</div>
                    
                    <table style="width: 100%; margin-top: 20px; text-align: center; font-size: 11pt;">
                        <tr>
                            <td style="width: 33%; vertical-align: top;">
                                Yang bersangkutan,<br><br><br><br><br><br>
                                ( <b>${s.nama.toUpperCase()}</b> )
                            </td>
                            <td style="width: 34%; vertical-align: top;">
                                <span style="font-size: 10pt; display: block; margin-bottom: 5px;">No. ${s.no_rw || '...'} /RW.001/      /${tahunSekarang}<br><b>MENGETAHUI</b></span>
                                KETUA RW.001<br>
                                <img src="${qrTtdOnlineRW}" style="width:85px; height:85px; margin: 8px 0; border: 1px solid #eee; padding:3px;"><br>
                                <small style="display:block; font-size:7.5pt; color:#555; font-style:italic;">✓ Divalidasi secara Online</small>
                                <u><b>MOCHAMAD SOFFA</b></u>
                            </td>
                            <td style="width: 33%; vertical-align: top;">
                                <br>Ketua RT. ${noRtFormatted}<br>
                                <img src="${qrTtdOnlineRT}" style="width:85px; height:85px; margin: 8px 0; border: 1px solid #eee; padding:3px;"><br>
                                <small style="display:block; font-size:7.5pt; color:#555; font-style:italic;">✓ Divalidasi secara Online</small>
                                <u><b>${namaRtValidator}</b></u>
                            </td>
                        </tr>
                    </table>
                </div>`;

            document.getElementById('isi-surat-cetak').innerHTML = templateDokumenWord;
            window.print();
        }
    </script>
</body>
</html>
